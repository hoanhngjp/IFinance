version: '3.8'

services:
  # 1. Database PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: ifinance_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ifinance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ifinance_net

  # 2. Database MongoDB (Dùng nội bộ cho AI Chat)
  mongodb:
    image: mongo:6.0
    container_name: ifinance_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ifinance_net

  # 3. Backend FastAPI
  backend:
    build: ./backend
    container_name: ifinance_backend
    ports:
      - "8000:8000"
    environment:
      # Trỏ DB về các container phía trên thay vì localhost
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/ifinance
      - MONGO_URI=mongodb://mongodb:27017/
      # Các biến bảo mật sẽ lấy từ file .env ở máy chủ
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-default_secret_key_change_me_in_production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      - postgres
      - mongodb
    # Tự động chạy Migration trước khi khởi động Server
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - ifinance_net

  # 4. Frontend ReactJS
  frontend:
    build: ./frontend
    container_name: ifinance_frontend
    ports:
      - "5173:80" # Map port 5173 trên máy bạn vào port 80 của Nginx
    depends_on:
      - backend
    networks:
      - ifinance_net

# Định nghĩa Volumes để dữ liệu không bị mất khi tắt Docker
volumes:
  postgres_data:
  mongodb_data:

networks:
  ifinance_net:
    driver: bridge